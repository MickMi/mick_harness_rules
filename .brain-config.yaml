# Git Brain Configuration
# This file controls the behavior of the Brain memory system.

version: "0.2.0"

# --- Brain Repository (Dual-Repo Model) ---
# The brain data lives in a separate private repository.
# This keeps personal memories isolated from the public harness repo.
brain_repo:
  # Git remote URL for the brain repository
  remote: "https://github.com/MickMi/mick_brain.git"
  # Local clone path (default: ~/.mick-brain)
  local_path: "~/.mick-brain"

# --- Directory Layout ---
# These paths are relative to the brain repo root (not harness root).
paths:
  global: "global"
  projects: "projects"
  sessions: "sessions"

# --- Retention Policy ---
retention:
  # Session layer auto-archive after N days (raw conversation digests)
  # Valuable content should already be distilled to Project/Global layers by then.
  session_ttl_days: 90
  # Maximum lines per single memory file before splitting
  max_memory_file_lines: 500

# --- Compound (Distillation) Rules ---
compound:
  # Daily: Session → Project layer distillation
  daily: true
  # Weekly: Project → Global layer distillation
  weekly: true

# --- Search Configuration ---
search:
  # Primary search engine (ripgrep is the default, always available)
  engine: "ripgrep"
  # Fallback engine if primary is unavailable
  fallback: "ripgrep"
  # Optional: semantic search tool (e.g., qmd), disabled by default due to ecosystem risk
  semantic_engine: null

# --- Multi-platform Write Sources ---
write_sources:
  # IDE AI (Cursor/Trae/Windsurf): direct shell write
  ide: true
  # CLI: `brain push` command
  cli: true
  # Webhook: post-conversation trigger
  webhook: false
